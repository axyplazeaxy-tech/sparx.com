<!DOCTYPE html>
<html>

<head>
    <title>School Hub</title>
    <link rel="stylesheet" href="style.css">
</head>


<body>


<div id="app">


<header>

    <h1>🏫 School Hub</h1>

    <p>Welcome back, Student</p>

</header>



<section class="news">

    <h2>📢 Latest News</h2>

    <div class="card">

        <h3>Welcome to our school app</h3>

        <p>
        Find everything you need about school,
        lessons, events and activities.
        </p>

    </div>


</section>





<section class="buttons">


<button onclick="openPage('timetable')">
📅 Timetable
</button>


<button onclick="openPage('subjects')">
📚 Subjects
</button>


<button onclick="openPage('homework')">
📝 Homework
</button>


<button onclick="openPage('events')">
🎉 Events
</button>


<button onclick="openPage('staff')">
👩‍🏫 Staff
</button>


<button onclick="openPage('contact')">
📞 Contact
</button>


</section>






<div id="page">


<h2>Select a section</h2>

<p>
Choose something above to view information.
</p>


</div>




<div class="learn-more">

    <button onclick="openGames()">
        🎮 Learn More
    </button>

</div>




</div>




<script src="app.js"></script>


</body>

</html>
