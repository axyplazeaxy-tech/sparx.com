<!DOCTYPE html>
<html>

<head>

<title>School Hub</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div id="app">


<header>

<div class="school-logo">
🏫
</div>

<h1 id="schoolTitle">
School Hub
</h1>

<p>
Student Portal
</p>

</header>




<div id="loginBox" class="card">


<h2>🔐 Login</h2>

<input id="school" placeholder="School name">

<input id="username" placeholder="Username">

<input id="password" placeholder="Password" type="password">


<button onclick="login()">
Log In
</button>


<p id="loginMessage"></p>


</div>







<div id="dashboard" style="display:none;">


<div class="card profile">

<h2>👤 Student Profile</h2>

<p>Name: <span id="studentName"></span></p>

<p>School: <span id="studentSchool"></span></p>

<p>Status: Online ✅</p>

</div>





<div class="card">

<h2>📢 Announcements</h2>

<p>Welcome to your school portal.</p>

<p>🏆 Sports Day coming soon!</p>

</div>





<div class="card">

<h2>🎯 Clubs</h2>

<p>⚽ Football</p>
<p>🎮 Computing</p>
<p>🎨 Art</p>
<p>🔬 Science</p>

</div>







<div class="card">

<h2>⚙️ Settings</h2>


<label>🌐 Language</label>

<select onchange="changeLanguage(this.value)">

<option>English</option>
<option>Spanish</option>
<option>French</option>

</select>


<br><br>


<label>🎨 Tint</label>

<input type="color" onchange="changeTint(this.value)">



<br><br>


<button onclick="lightMode()">
☀️ Light
</button>


<button onclick="darkMode()">
🌙 Dark
</button>


</div>







<div class="buttons">


<button onclick="openPage('timetable')">
📅 Timetable
</button>


<button onclick="openPage('subjects')">
📚 Subjects
</button>


<button onclick="openPage('homework')">
📝 Homework
</button>


<button onclick="openPage('events')">
🎉 Events
</button>


<button onclick="openPage('staff')">
👩‍🏫 Staff
</button>


<button onclick="openPage('contact')">
📞 Contact
</button>


</div>






<div id="page">

<h2>Welcome</h2>

<p>Select a section.</p>

</div>







<button onclick="openGames()">

🎮 Learn More

</button>


<br><br>


<button onclick="logout()">

🚪 Logout

</button>



</div>


</div>




<script src="app.js"></script>


</body>

</html>
