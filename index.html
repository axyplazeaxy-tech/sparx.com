<!DOCTYPE html>
<html>

<head>

<title>School Hub Pro</title>

<link rel="stylesheet" href="style.css">

<link rel="manifest" href="manifest.json">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>


<body>


<div id="loading">

🏫
<br>
Loading School Hub...

</div>




<div id="app">


<header>

<div class="school-logo">
🏫
</div>


<h1 id="schoolTitle">
School Hub
</h1>


<p>
Student Portal
</p>


</header>






<div id="loginBox" class="card">


<h2>🔐 Login</h2>


<input id="school" placeholder="School name">


<input id="username" placeholder="Username">


<input id="password" placeholder="Password" type="password">



<button onclick="login()">

Log In

</button>


<p id="loginMessage"></p>


</div>








<div id="dashboard" style="display:none;">





<div class="card profile">


<h2>
👤 Student Profile
</h2>


<p>
Name:
<span id="studentName"></span>
</p>


<p>
School:
<span id="studentSchool"></span>
</p>


<p>
Status:
Online ✅
</p>


</div>








<div class="card">


<h2>
🔔 Notifications
</h2>


<div class="notice">

📢 Welcome to School Hub!

</div>


<div class="notice">

🏆 Sports Day announced

</div>


</div>









<div class="card">


<h2>
📝 Homework
</h2>


<input id="newHomework" placeholder="Add homework">


<button onclick="addHomework()">

Add

</button>


<div id="homeworkList">

</div>


</div>








<div class="card">


<h2>
📅 Timetable
</h2>


<div id="timetable">

Monday<br>
Maths<br>
Science<br>
English

</div>


</div>








<div class="card">


<h2>
⚙️ Settings
</h2>



<button onclick="lightMode()">

☀️ Light

</button>


<button onclick="darkMode()">

🌙 Dark

</button>



<br><br>



<label>

🎨 Theme Colour

</label>


<input type="color" onchange="changeTint(this.value)">



</div>









<div class="buttons">


<button onclick="openPage('subjects')">

📚 Subjects

</button>


<button onclick="openPage('events')">

🎉 Events

</button>


<button onclick="openPage('staff')">

👩‍🏫 Staff

</button>


<button onclick="openPage('contact')">

📞 Contact

</button>


</div>







<div id="page">


<h2>

Welcome

</h2>


<p>

Choose a section.

</p>


</div>









<button class="learn"

onclick="openGames()">

🎮 Learn More

</button>





<button onclick="logout()">

🚪 Logout

</button>






</div>


</div>







<script src="app.js"></script>


</body>


</html>
