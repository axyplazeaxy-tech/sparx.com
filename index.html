<!DOCTYPE html>
<html>
<head>
    <title>Five Nights Custom</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="game">

<h1>🌙 Five Nights Custom</h1>

<div id="office">

<h2>Security Office</h2>

<p id="time">12:00 AM</p>
<p id="power">Power: 100%</p>

<div id="screen">
    <p>Office Camera View</p>
</div>

<button onclick="openCamera()">
📹 Cameras
</button>

<button onclick="toggleDoor()">
🚪 Door
</button>

<button onclick="toggleLight()">
💡 Light
</button>

</div>



<div id="cameras">

<h2>📹 Security Monitor</h2>

<div id="cameraScreen">
    <h3 id="cameraName">
        Camera 1 - Stage
    </h3>

    <p id="cameraImage">
        📺 Camera Feed Loading...
    </p>
</div>


<button onclick="camera('stage')">
CAM 1
</button>

<button onclick="camera('hall')">
CAM 2
</button>

<button onclick="camera('room')">
CAM 3
</button>

<br>

<button onclick="closeCamera()">
⬅ Back
</button>

</div>


</div>


<script src="script.js"></script>
<script src="controller.js"></script>
</body>
</html>
