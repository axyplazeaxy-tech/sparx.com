<!DOCTYPE html>
<html>
<head>
    <title>Sparx Arcade</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>⚡ SPARX</h1>
    <p>Learning made smarter</p>
</header>


<section class="cards">

    <div class="card">
        <h2>📘 Sparx Maths</h2>
        <p>Improve your maths skills with practice.</p>
    </div>

    <div class="card">
        <h2>🔬 Sparx Science</h2>
        <p>Explore science and discover new things.</p>
    </div>

    <div class="card">
        <h2>📖 Sparx Reader</h2>
        <p>Build reading skills and vocabulary.</p>
    </div>

</section>


<button class="more" onclick="openGames()">
    🎮 Open Sparx Arcade
</button>



<div id="arcade">

    <h1>🕹️ SPARX ARCADE</h1>

    <p>Select a game</p>


    <div id="gameMenu">

        <button onclick="startGame('flappy')">
            🐦 Flappy Sparx
        </button>

        <button onclick="startGame('snake')">
            🐍 Snake
        </button>

        <button onclick="startGame('pong')">
            🏓 Pong
        </button>

        <button onclick="startGame('breakout')">
            🧱 Breakout
        </button>

        <button onclick="startGame('space')">
            🚀 Space Defender
        </button>

        <button onclick="startGame('racer')">
            🏎️ Pixel Racer
        </button>

        <button onclick="startGame('runner')">
            🏃 Endless Runner
        </button>

        <button onclick="startGame('target')">
            🎯 Target Blaster
        </button>

    </div>


    <canvas id="gameCanvas" width="500" height="400"></canvas>


    <div id="touchControls">

        <button onclick="move('left')">⬅️</button>
        <button onclick="move('up')">⬆️</button>
        <button onclick="move('down')">⬇️</button>
        <button onclick="move('right')">➡️</button>

    </div>


    <button class="back" onclick="closeGames()">
        ← Back
    </button>

</div>


<script src="script.js"></script>

</body>
</html>
